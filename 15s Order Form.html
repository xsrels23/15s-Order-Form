<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Booster Media - 15s Ad Order Form</title>
  
  <!-- Inter Font from Jotform Specifications -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config to match Jotform CSS theme colors exactly -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brandPink: '#ec4899',
            brandPurple: '#8b5cf6',
            brandDark: '#111827',
            brandGray: '#1f2937',
            brandMuted: '#6b7280',
            supernova: '#f3f4f6'
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for JSX Compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Embedded Jotform CSS Overrides for Premium Aesthetic -->
  <style>
    /* Gradient headers */
    .brand-gradient-text {
      background: linear-gradient(to right, #ec4899, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: #8b5cf6;
    }

    /* Standard Inputs focus overrides */
    .form-input-custom:focus {
      border-color: #ec4899 !important;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15) !important;
      outline: none;
    }

    /* Custom Submit Button Background Size Animation */
    .form-submit-button-custom {
      background-image: linear-gradient(to right, #ec4899 0%, #8b5cf6 51%, #ec4899 100%);
      background-size: 200% auto;
      transition: all 0.5s ease;
    }
    .form-submit-button-custom:hover {
      background-position: right center;
    }
  </style>
</head>
<body class="bg-supernova text-brandGray font-sans min-h-screen">

  <!-- Core App Mounting node -->
  <div id="root"></div>

  <!-- Firebase Modular SDK Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Grab environment variables if provided, otherwise default safe structures
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'brand-booster-media-ad-wizard';
    
    let config = null;
    if (typeof __firebase_config !== 'undefined' && __firebase_config) {
      try {
        config = JSON.parse(__firebase_config);
      } catch (e) {
        console.warn("Invalid firebase configuration format. Fallback state will be used.");
      }
    }

    // Bind to window to allow React scripts to use Firebase features cleanly
    if (config && config.apiKey) {
      try {
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseApp = app;
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseAppId = appId;
        window.firebaseAuthMethods = { 
          signInAnonymously, 
          signInWithCustomToken, 
          onAuthStateChanged, 
          collection, 
          doc, 
          setDoc, 
          getDoc, 
          addDoc, 
          getDocs,
          onSnapshot, 
          query, 
          serverTimestamp 
        };
        window.firebaseEnabled = true;
      } catch (err) {
        console.error("Firebase module setup failed:", err);
        window.firebaseEnabled = false;
      }
    } else {
      window.firebaseEnabled = false;
    }
  </script>

  <!-- React JSX Application -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      // Firebase status
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [ordersList, setOrdersList] = useState([]);
      const [ordersLoading, setOrdersLoading] = useState(false);
      
      // Global app logic
      const [orderIdFromUrl, setOrderIdFromUrl] = useState(null);
      const [loadedSharedOrder, setLoadedSharedOrder] = useState(null);
      const [errorMessage, setErrorMessage] = useState(null);
      const [successMessage, setSuccessMessage] = useState(null);
      const [savingOrder, setSavingOrder] = useState(false);
      const [isAiGenerating, setIsAiGenerating] = useState(false);
      const [activeTab, setActiveTab] = useState('creator'); // 'creator' | 'hub' | 'shared_viewer'

      // Form Steps state
      // We map the pages dynamically to provide smooth progress.
      // Page Index layout:
      // 0: Page 1 (Starting Gate: Email & Ad Type selection)
      // 1: Step 1 (Problem / Wow Shot)
      // 2: Step 2 (Service Action / Product Usage)
      // 3: Step 3 (Life After Solution / Premium Detail)
      // 4: Step 4 (CTAs & website & file attachments)
      // 5: Page 10 (Voiceover script submission)
      // 6: Thank you screen
      const [currentStepIndex, setCurrentStepIndex] = useState(0);

      // Main Form Data State
      const [formData, setFormData] = useState({
        email: '',
        adType: '', // 'service' or 'product'
        
        // Template A (Service Fields)
        serviceProblem: '',
        serviceProblemText: 'THE PROBLEM?',
        serviceAction: '',
        serviceActionText: 'WE HANDLE IT.',
        serviceRelief: '',
        serviceReliefText: 'DONE RIGHT.',
        
        // Template B (Product Fields)
        productWow: '',
        productWowText: 'MEET OUR BRAND',
        productUsage: '',
        productUsageText: 'SMART FUNCTION',
        productDetail: '',
        productDetailText: 'UPGRADE YOURS.',

        // Branding & CTA inputs
        websiteUrl: '',
        ctaText: 'BOOK NOW',
        fileLink: '', // Required file sharing field from Jotform design requirement
        logoMock: '', // representation placeholder
        
        // Voice Actor Script input
        voiceScript: ''
      });

      // Video Mockup Player State
      const [isPlayingSim, setIsPlayingSim] = useState(true);
      const [simProgress, setSimProgress] = useState(0); // 0 to 100 percent
      const [currentSimScene, setCurrentSimScene] = useState(1); // 1, 2, 3, or 4

      // --------------------------------------------------
      // FIREBASE & CLOUD INTEGRATION IMPLEMENTATION
      // --------------------------------------------------
      useEffect(() => {
        // Parse URL queries to check if viewing a shared order
        const urlParams = new URLSearchParams(window.location.search);
        const sOrder = urlParams.get('orderId');
        if (sOrder) {
          setOrderIdFromUrl(sOrder);
          setActiveTab('shared_viewer');
        }

        // Initialize Anonymous Auth
        const runAuth = async () => {
          if (!window.firebaseEnabled) {
            setAuthLoading(false);
            return;
          }
          const { firebaseAuth, firebaseAuthMethods } = window;
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await firebaseAuthMethods.signInWithCustomToken(firebaseAuth, __initial_auth_token);
            } else {
              await firebaseAuthMethods.signInAnonymously(firebaseAuth);
            }
          } catch (e) {
            console.error("Auth helper error:", e);
          }
        };

        runAuth();

        if (window.firebaseEnabled) {
          const { firebaseAuth, firebaseAuthMethods } = window;
          const unsubscribe = firebaseAuthMethods.onAuthStateChanged(firebaseAuth, (currentUser) => {
            setUser(currentUser);
            setAuthLoading(false);
          });
          return () => unsubscribe();
        } else {
          setAuthLoading(false);
        }
      }, []);

      // Load Selected shared order if requested
      useEffect(() => {
        if (orderIdFromUrl && window.firebaseEnabled && user) {
          fetchSharedOrder(orderIdFromUrl);
        }
      }, [orderIdFromUrl, user]);

      // Load all saved orders for order hub dashboard
      useEffect(() => {
        if (user && window.firebaseEnabled && activeTab === 'hub') {
          fetchOrdersList();
        }
      }, [user, activeTab]);

      const fetchSharedOrder = async (orderId) => {
        try {
          const { firebaseDb, firebaseAuthMethods, firebaseAppId } = window;
          const orderDocRef = firebaseAuthMethods.doc(firebaseDb, 'artifacts', firebaseAppId, 'public', 'data', 'orders', orderId);
          const snap = await firebaseAuthMethods.getDoc(orderDocRef);
          if (snap.exists()) {
            setLoadedSharedOrder({ id: snap.id, ...snap.data() });
          } else {
            setErrorMessage("Shared ad blueprint could not be found. It may have been removed.");
          }
        } catch (e) {
          setErrorMessage("Failed to download shared order blueprint from the servers.");
        }
      };

      const fetchOrdersList = async () => {
        setOrdersLoading(true);
        try {
          const { firebaseDb, firebaseAuthMethods, firebaseAppId } = window;
          const ordersColRef = firebaseAuthMethods.collection(firebaseDb, 'artifacts', firebaseAppId, 'public', 'data', 'orders');
          const snap = await firebaseAuthMethods.getDocs(ordersColRef);
          const loaded = [];
          snap.forEach((doc) => {
            loaded.push({ id: doc.id, ...doc.data() });
          });
          // Sort locally inside system memory to respect No-Complex-Queries constraint (Rule 2)
          loaded.sort((a, b) => {
            const timeA = a.createdAt?.seconds || 0;
            const timeB = b.createdAt?.seconds || 0;
            return timeB - timeA;
          });
          setOrdersList(loaded);
        } catch (e) {
          console.error("Error retrieving active orders:", e);
        } finally {
          setOrdersLoading(false);
        }
      };

      // --------------------------------------------------
      // SIMULATOR TIMER EFFECT (15 SECONDS TOTAL AD LENGTH)
      // --------------------------------------------------
      useEffect(() => {
        let interval = null;
        if (isPlayingSim) {
          interval = setInterval(() => {
            setSimProgress((prev) => {
              const next = prev + 1.25; // Speed configured to complete in exactly 15 seconds (100 / (15 * 5.3))
              if (next >= 100) {
                return 0; // Loops automatically
              }
              return next;
            });
          }, 150);
        } else {
          clearInterval(interval);
        }
        return () => clearInterval(interval);
      }, [isPlayingSim]);

      // Map progress percentage back to scene numbers (4 equal parts)
      useEffect(() => {
        if (simProgress < 25) {
          setCurrentSimScene(1);
        } else if (simProgress >= 25 && simProgress < 50) {
          setCurrentSimScene(2);
        } else if (simProgress >= 50 && simProgress < 75) {
          setCurrentSimScene(3);
        } else {
          setCurrentSimScene(4);
        }
      }, [simProgress]);

      // Helper function to count words for strict Voice Over boundaries (35-45)
      const countWords = (text) => {
        if (!text) return 0;
        return text.trim().split(/\s+/).filter(w => w.length > 0).length;
      };

      const wordCount = countWords(formData.voiceScript);

      const getWordCountColor = () => {
        if (wordCount === 0) return 'text-brandMuted bg-gray-100';
        if (wordCount >= 35 && wordCount <= 45) return 'text-green-700 bg-green-50 border-green-200 border';
        if (wordCount < 35) return 'text-yellow-700 bg-yellow-50 border-yellow-200 border';
        return 'text-red-700 bg-red-50 border-red-200 border';
      };

      // Handle custom file upload triggers to mock standard user actions
      const handleFakeFileUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          setFormData(prev => ({
            ...prev,
            logoMock: file.name
          }));
        }
      };

      // --------------------------------------------------
      // NAVIGATION CONTROLS (BRANCHING RULES)
      // --------------------------------------------------
      const handleNextStep = () => {
        // Step 0 validation
        if (currentStepIndex === 0) {
          if (!formData.email) {
            setErrorMessage("Please fill out your contact email address first.");
            return;
          }
          if (!formData.adType) {
            setErrorMessage("Please select whether you are advertising 'A Service' or 'A Product'.");
            return;
          }
          // Default CTA texts dynamically based on branch chosen
          if (formData.adType === 'service' && formData.ctaText === 'BOOK NOW') {
            setFormData(prev => ({ ...prev, ctaText: 'BOOK NOW' }));
          } else if (formData.adType === 'product' && formData.ctaText === 'BOOK NOW') {
            setFormData(prev => ({ ...prev, ctaText: 'SHOP NOW' }));
          }
        }

        // Step 4 validation (CTA and Link fields)
        if (currentStepIndex === 4) {
          if (!formData.fileLink) {
            setErrorMessage("Please provide your files link (Google Drive, Dropbox, etc.) to proceed.");
            return;
          }
        }

        setErrorMessage(null);
        setCurrentStepIndex(prev => prev + 1);
      };

      const handlePrevStep = () => {
        setErrorMessage(null);
        setCurrentStepIndex(prev => Math.max(0, prev - 1));
      };

      // --------------------------------------------------
      // GENERATE AI AD SCRIPT (GEMINI-2.5-FLASH COGNITION)
      // --------------------------------------------------
      const handleGenerateAiScript = async () => {
        setIsAiGenerating(true);
        setErrorMessage(null);

        // Exponential backoff configuration
        const runFetchWithBackoff = async (attemptsLeft = 5, delay = 1000) => {
          const userQuery = formData.adType === 'service' 
            ? `Please write a 15-second ad script for a service called: "${formData.serviceProblemText}" or related. 
               The problem we solve is: "${formData.serviceProblem}". 
               How we fix it in action: "${formData.serviceAction}". 
               The relief feeling: "${formData.serviceRelief}". 
               Target audience CTA: "${formData.ctaText}".
               Provide an extremely engaging, high-converting voiceover script that is strictly between 35 and 45 words.`
            : `Please write a 15-second ad script for a product. 
               Product introduction pop-up text is: "${formData.productWowText}". 
               Wow representation of the product: "${formData.productWow}". 
               How they use it: "${formData.productUsage}". 
               Best feature to highlight: "${formData.productUsageText}". 
               Premium close up detail: "${formData.productDetail}".
               Target audience CTA: "${formData.ctaText}".
               Provide an extremely engaging, high-converting voiceover script that is strictly between 35 and 45 words.`;

          const systemPrompt = "You are a professional ad strategist and copywriter for Brand Booster Media. You write direct, powerful 15-second social media ad voiceovers. Ensure the final result is strictly between 35 and 45 words maximum. Do not include scene brackets, visual directions, or extra dialogue labels—only return the plain text voiceover script ready to be read by an actor.";

          try {
            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: userQuery }] }],
                  systemInstruction: { parts: [{ text: systemPrompt }] }
                }),
              }
            );

            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }

            const result = await response.json();
            const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (text) {
              setFormData(prev => ({ ...prev, voiceScript: text.trim() }));
              setSuccessMessage("✨ AI Ad Script generated and matched to your parameters!");
              setTimeout(() => setSuccessMessage(null), 5000);
            } else {
              throw new Error("Empty text candidate from Gemini response");
            }
          } catch (error) {
            if (attemptsLeft > 0) {
              await new Promise(resolve => setTimeout(resolve, delay));
              return runFetchWithBackoff(attemptsLeft - 1, delay * 2);
            } else {
              setErrorMessage("AI Assistant is currently busy. Please write or paste your script below, or retry shortly.");
            }
          }
        };

        await runFetchWithBackoff();
        setIsAiGenerating(false);
      };

      // --------------------------------------------------
      // ORDER SUBMISSION / WRITE TO FIRESTORE
      // --------------------------------------------------
      const handleSubmitOrder = async (e) => {
        if (e) e.preventDefault();
        setSavingOrder(true);
        setErrorMessage(null);

        // Validation for final voiceover script
        if (wordCount === 0) {
          setErrorMessage("Please complete your video's voiceover script before submitting.");
          setSavingOrder(false);
          return;
        }

        if (!window.firebaseEnabled) {
          // If Firestore is disabled/unconfigured, run client-only simulation saving
          setTimeout(() => {
            setSavingOrder(false);
            setCurrentStepIndex(6); // Step to confirmation screen
            setSuccessMessage("Form compiled! (App running in Local Session Mode)");
          }, 1500);
          return;
        }

        try {
          const { firebaseDb, firebaseAuthMethods, firebaseAppId } = window;
          const targetCollection = firebaseAuthMethods.collection(firebaseDb, 'artifacts', firebaseAppId, 'public', 'data', 'orders');
          
          const payload = {
            ...formData,
            wordCount,
            createdAt: firebaseAuthMethods.serverTimestamp()
          };

          const docRef = await firebaseAuthMethods.addDoc(targetCollection, payload);
          if (docRef.id) {
            // Update URL query dynamically without full page reload
            const newUrl = `${window.location.origin}${window.location.pathname}?orderId=${docRef.id}`;
            window.history.pushState({ path: newUrl }, '', newUrl);
            setOrderIdFromUrl(docRef.id);
            setCurrentStepIndex(6); // Step to confirmation screen
          }
        } catch (err) {
          console.error("Firestore submit error:", err);
          setErrorMessage("Could not submit order to the cloud servers. Please verify your internet connection.");
        } finally {
          setSavingOrder(false);
        }
      };

      // Shared Order visual selector helper
      const startNewOrderFromBlank = () => {
        setFormData({
          email: '',
          adType: '',
          serviceProblem: '',
          serviceProblemText: 'THE PROBLEM?',
          serviceAction: '',
          serviceActionText: 'WE HANDLE IT.',
          serviceRelief: '',
          serviceReliefText: 'DONE RIGHT.',
          productWow: '',
          productWowText: 'MEET OUR BRAND',
          productUsage: '',
          productUsageText: 'SMART FUNCTION',
          productDetail: '',
          productDetailText: 'UPGRADE YOURS.',
          websiteUrl: '',
          ctaText: 'BOOK NOW',
          fileLink: '',
          logoMock: '',
          voiceScript: ''
        });
        setCurrentStepIndex(0);
        setOrderIdFromUrl(null);
        setLoadedSharedOrder(null);
        setActiveTab('creator');
        // Strip query parameters
        window.history.pushState({}, document.title, window.location.pathname);
      };

      // Live Simulator Dynamic Render Data
      const activeOverlayText = () => {
        const source = loadedSharedOrder || formData;
        const type = source.adType || 'service';
        if (type === 'service') {
          if (currentSimScene === 1) return source.serviceProblemText || 'THE PROBLEM?';
          if (currentSimScene === 2) return source.serviceActionText || 'WE HANDLE IT.';
          if (currentSimScene === 3) return source.serviceReliefText || 'DONE RIGHT.';
          return source.ctaText || 'BOOK NOW';
        } else {
          if (currentSimScene === 1) return source.productWowText || 'MEET OUR BRAND';
          if (currentSimScene === 2) return source.productUsageText || 'SMART FUNCTION';
          if (currentSimScene === 3) return source.productDetailText || 'UPGRADE YOURS.';
          return source.ctaText || 'SHOP NOW';
        }
      };

      const activeSceneDescription = () => {
        const source = loadedSharedOrder || formData;
        const type = source.adType || 'service';
        if (type === 'service') {
          if (currentSimScene === 1) return source.serviceProblem || 'Imagine a customer facing their biggest issue right now...';
          if (currentSimScene === 2) return source.serviceAction || 'Showing how your helpful service saves the day in real-time...';
          if (currentSimScene === 3) return source.serviceRelief || 'The amazing relief of having the task fully completed!';
          return `Final Destination: ${source.websiteUrl || 'yourbrand.com'}`;
        } else {
          if (currentSimScene === 1) return source.productWow || 'Stunning slow-motion product reveal in flawless presentation light...';
          if (currentSimScene === 2) return source.productUsage || 'A close-up demonstration of how intuitive and helpful your item is...';
          if (currentSimScene === 3) return source.productDetail || 'Zooming into the exquisite stitching and premium design details...';
          return `Final Destination: ${source.websiteUrl || 'yourbrand.com'}`;
        }
      };

      const activeVoiceSubtitle = () => {
        const source = loadedSharedOrder || formData;
        const script = source.voiceScript;
        if (!script) return '"(Voice actor narration script will scroll here)"';
        
        // Chunk narration into 4 scenes automatically based on timeline to simulate active subtitles
        const words = script.split(/\s+/);
        const chunkSize = Math.ceil(words.length / 4);
        const currentChunk = words.slice((currentSimScene - 1) * chunkSize, currentSimScene * chunkSize).join(' ');
        return `"${currentChunk || '...'}"`;
      };

      // Background styling helper for simulator screen
      const getSimBackgroundGradient = () => {
        if (currentSimScene === 1) {
          return 'from-rose-500 to-indigo-600'; // Stressed/Frustrated state
        } else if (currentSimScene === 2) {
          return 'from-purple-600 to-pink-500'; // In action state
        } else if (currentSimScene === 3) {
          return 'from-teal-500 to-cyan-600'; // Perfect relief state
        } else {
          return 'from-indigo-600 via-pink-500 to-purple-700'; // CTA Final Outro State
        }
      };

      return (
        <div className="max-w-7xl mx-auto px-4 py-8">
          
          {/* TOP HEADER & NAVIGATION HUB */}
          <header className="flex flex-col md:flex-row justify-between items-center mb-8 pb-6 border-b border-gray-200">
            <div className="flex items-center space-x-3 mb-4 md:mb-0">
              <div className="w-10 h-10 rounded-xl bg-gradient-to-r from-brandPink to-brandPurple flex items-center justify-center shadow-md">
                <span className="text-white font-extrabold text-xl tracking-tight">B</span>
              </div>
              <div>
                <h1 className="text-xl font-extrabold tracking-tight text-brandDark">
                  BRAND BOOSTER <span className="brand-gradient-text">MEDIA</span>
                </h1>
                <p className="text-xs text-brandMuted uppercase tracking-widest font-semibold">15s Social Ad Wizard</p>
              </div>
            </div>

            <div className="flex space-x-3">
              <button 
                onClick={() => { setActiveTab('creator'); if (currentStepIndex === 6) setCurrentStepIndex(0); }}
                className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${activeTab === 'creator' ? 'bg-white shadow-sm border border-gray-200 text-brandPurple' : 'text-brandMuted hover:text-brandDark'}`}
              >
                <i className="lucide-edit-3 inline-block w-4 h-4 mr-1.5 align-text-bottom"></i>
                Ad Creator Form
              </button>
              <button 
                onClick={() => setActiveTab('hub')}
                className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${activeTab === 'hub' ? 'bg-white shadow-sm border border-gray-200 text-brandPurple' : 'text-brandMuted hover:text-brandDark'}`}
              >
                <i className="lucide-database inline-block w-4 h-4 mr-1.5 align-text-bottom"></i>
                Saved Ad Blueprints
              </button>
              {orderIdFromUrl && (
                <button 
                  onClick={() => setActiveTab('shared_viewer')}
                  className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${activeTab === 'shared_viewer' ? 'bg-white shadow-sm border border-gray-200 text-brandPurple' : 'text-brandMuted hover:text-brandDark'}`}
                >
                  <i className="lucide-eye inline-block w-4 h-4 mr-1.5 align-text-bottom"></i>
                  Viewing Blueprint #{orderIdFromUrl.slice(0, 5)}
                </button>
              )}
            </div>
          </header>

          {/* GLOBAL FEEDBACK BARS */}
          {errorMessage && (
            <div className="mb-6 p-4 bg-red-100 text-[#b91c1c] border border-red-200 rounded-lg flex items-center space-x-3 shadow-sm">
              <div className="w-5 h-5 flex items-center justify-center bg-[#b91c1c] text-white rounded-full text-xs font-bold">!</div>
              <span className="font-medium text-sm">{errorMessage}</span>
            </div>
          )}

          {successMessage && (
            <div className="mb-6 p-4 bg-green-100 text-green-800 border border-green-200 rounded-lg flex items-center space-x-3 shadow-sm">
              <div className="w-5 h-5 flex items-center justify-center bg-green-600 text-white rounded-full text-xs font-bold">✓</div>
              <span className="font-medium text-sm">{successMessage}</span>
            </div>
          )}

          {/* MAIN COLUMN SYSTEM */}
          {activeTab === 'creator' && (
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
              
              {/* LEFT COLUMN: THE INTERACTIVE WIZARD FORM */}

                              className="px-3 py-2 bg-brandPurple text-white text-xs font-bold rounded-lg hover:bg-opacity-90 transition-all"
                            >
                              Copy
                            </button>
                          </div>
                        </div>
                      ) : (
                        <div className="p-4 bg-yellow-50 text-yellow-800 rounded-xl max-w-md mx-auto text-xs text-left">
                          <strong>Note:</strong> App is running in Local Preview. In production, this form generates active cloud links to share live client videos with colleagues.
                        </div>
                      )}

                      <div className="pt-4 border-t border-gray-100 flex justify-center space-x-4">
                        <button 
                          onClick={startNewOrderFromBlank}
                          className="px-6 py-2.5 rounded-lg border border-gray-300 text-brandDark font-bold text-sm hover:bg-gray-50 transition"
                        >
                          Build Another Video
                        </button>
                        <button 
                          onClick={() => setActiveTab('hub')}
                          className="px-6 py-2.5 rounded-lg bg-brandDark text-white font-bold text-sm hover:bg-opacity-90 transition"
                        >
                          View Order History
                        </button>
                      </div>
                    </div>
                  )}

                  {/* ACTION FOOTER BUTTONS */}
                  {currentStepIndex < 6 && (
                    <div className="mt-8 pt-6 border-t border-gray-100 flex justify-between items-center">
                      <button 
                        type="button"
                        onClick={handlePrevStep}
                        disabled={currentStepIndex === 0}
                        className={`px-5 py-2.5 rounded-lg text-sm font-bold border transition ${
                          currentStepIndex === 0 
                            ? 'border-gray-200 text-gray-300 cursor-not-allowed bg-gray-50' 
                            : 'border-gray-300 text-brandDark hover:bg-gray-50'
                        }`}
                      >
                        Back
                      </button>

                      {currentStepIndex < 5 ? (
                        <button 
                          type="button"
                          onClick={handleNextStep}
                          className="px-6 py-2.5 rounded-lg bg-brandDark text-white text-sm font-bold hover:bg-opacity-90 transition shadow-sm"
                        >
                          Continue Setup
                        </button>
                      ) : (
                        <button 
                          type="button"
                          onClick={handleSubmitOrder}
                          disabled={savingOrder}
                          className="px-8 py-3 form-submit-button-custom text-white text-base font-bold rounded-full shadow-lg hover:scale-105 transition duration-300 flex items-center space-x-2"
                        >
                          {savingOrder ? (
                            <span>Uploading Ad Blueprint...</span>
                          ) : (
                            <>
                              <i className="lucide-send w-5 h-5"></i>
                              <span>Submit My Ad Order</span>
                            </>
                          )}
                        </button>
                      )}
                    </div>
                  )}
                </div>
              </div>

              {/* RIGHT COLUMN: THE LIVE VIDEO & TIMELINE SIMULATOR */}
              <div className="lg:col-span-5 space-y-6 lg:sticky lg:top-8">
                
                {/* VERTICAL PHONE PREVIEW CONTAINER */}
                <div className="bg-white p-4 rounded-2xl border border-gray-100 shadow-[0_4px_10px_rgba(0,0,0,0.05)] text-center">
                  <div className="flex justify-between items-center mb-3 px-1">
                    <div className="flex items-center space-x-2">
                      <span className="flex h-2.5 w-2.5 relative">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-rose-500"></span>
                      </span>
                      <span className="text-xs font-extrabold tracking-widest text-brandDark uppercase">15s Live Simulation</span>
                    </div>
                    
                    {/* Play / Pause toggle */}
                    <button 
                      onClick={() => setIsPlayingSim(!isPlayingSim)}
                      className="text-xs font-bold text-brandPurple bg-purple-50 px-2.5 py-1 rounded-md flex items-center space-x-1 hover:bg-purple-100 transition-colors"
                    >
                      <i className={`lucide-${isPlayingSim ? 'pause' : 'play'} w-3.5 h-3.5`}></i>
                      <span>{isPlayingSim ? 'PAUSE' : 'PLAY'}</span>
                    </button>
                  </div>

                  {/* MOBILE DEVICE SHELL CONTAINER */}
                  <div className="relative mx-auto max-w-[270px] aspect-[9/16] rounded-[2.5rem] ring-12 ring-gray-900 shadow-2xl bg-black border-4 border-gray-800 overflow-hidden">
                    
                    {/* Dynamic Simulated Background based on Active Scene */}
                    <div className={`absolute inset-0 bg-gradient-to-b ${getSimBackgroundGradient()} transition-all duration-700 flex flex-col justify-between p-6 text-white`}>
                      
                      {/* Top Branding Bar */}
                      <div className="flex justify-between items-center mt-2">
                        <div className="flex items-center space-x-1.5 bg-black/20 px-2.5 py-1 rounded-full backdrop-blur-sm">
                          <div className="w-4 h-4 rounded-full bg-white flex items-center justify-center">
                            <span className="text-[10px] text-brandPurple font-extrabold">B</span>
                          </div>
                          <span className="text-[9px] font-black tracking-wider uppercase">BRAND BOOSTER</span>
                        </div>
                        <span className="text-[10px] font-mono tracking-widest bg-black/40 px-2 py-0.5 rounded-full">
                          {Math.floor(simProgress / 6.6).toString().padStart(2, '0')}s
                        </span>
                      </div>

                      {/* Center Graphical Representation of Scenario */}
                      <div className="flex flex-col items-center text-center justify-center space-y-4 my-auto">
                        <div className="w-16 h-16 rounded-full bg-white/15 backdrop-blur-md flex items-center justify-center animate-bounce">
                          {currentSimScene === 1 ? (
                            <i className="lucide-frown w-8 h-8 text-white"></i>
                          ) : currentSimScene === 2 ? (
                            <i className="lucide-activity w-8 h-8 text-white"></i>
                          ) : currentSimScene === 3 ? (
                            <i className="lucide-smile w-8 h-8 text-white"></i>
                          ) : (
                            <i className="lucide-rocket w-8 h-8 text-white"></i>
                          )}
                        </div>
                        
                        {/* THE DYNAMIC TEXT OVERLAY FROM THE ACTIVE FORM FIELD */}
                        <div className="px-2">
                          <h3 className="text-xl font-extrabold uppercase tracking-tight drop-shadow-lg leading-tight animate-pulse">
                            {activeOverlayText()}
                          </h3>
                        </div>

                        {/* Interactive dynamic narration outline */}
                        <p className="text-[11px] font-medium leading-relaxed bg-black/20 p-2.5 rounded-lg border border-white/10 backdrop-blur-xs max-w-[210px] mx-auto text-white/90">
                          {activeSceneDescription()}
                        </p>
                      </div>

                      {/* Outro Dynamic Layout / CTA Layer */}
                      <div className="space-y-3 mb-2">
                        
                        {/* Timed Voice over transcription matching subtitles */}
                        <div className="bg-black/55 backdrop-blur-md border border-white/10 p-2.5 rounded-xl text-center">
                          <p className="text-[10px] text-brandPink uppercase tracking-widest font-black mb-0.5">Live Subtitle Narration</p>
                          <p className="text-[11px] leading-relaxed italic font-bold text-gray-100">
                            {activeVoiceSubtitle()}
                          </p>
                        </div>

                        {/* Bottom Seek Timeline Bar */}
                        <div className="w-full bg-white/20 h-1.5 rounded-full overflow-hidden">
                          <div className="bg-brandPink h-full transition-all duration-150" style={{ width: `${simProgress}%` }}></div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* MANUAL TIMELINE STEPPER SWITCHERS */}
                  <div className="mt-4 grid grid-cols-4 gap-2">
                    {[1, 2, 3, 4].map((sceneNum) => (
                      <button 
                        key={sceneNum}
                        onClick={() => {
                          setIsPlayingSim(false);
                          setSimProgress((sceneNum - 1) * 25 + 5);
                        }}
                        className={`p-2 rounded-lg text-xs font-bold transition-all ${
                          currentSimScene === sceneNum 
                            ? 'bg-gradient-to-r from-brandPink to-brandPurple text-white shadow-md' 
                            : 'bg-gray-100 text-brandMuted hover:bg-gray-200'
                        }`}
                      >
                        Scene {sceneNum}
                      </button>
                    ))}
                  </div>
                </div>

                {/* SCENARIO BLUEPRINT STATS */}
                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-[0_4px_10px_rgba(0,0,0,0.05)] space-y-4">
                  <h3 className="font-extrabold text-sm text-brandDark uppercase tracking-wider">Ad Configuration Summary</h3>
                  <div className="grid grid-cols-2 gap-3 text-xs font-semibold">
                    <div className="p-3 bg-gray-50 rounded-lg">
                      <span className="block text-brandMuted uppercase text-[9px] mb-1">Ad Target Class</span>
                      <span className="text-brandDark uppercase">{formData.adType || 'NOT SELECTED'}</span>
                    </div>
                    <div className="p-3 bg-gray-50 rounded-lg">
                      <span className="block text-brandMuted uppercase text-[9px] mb-1">CTA Action</span>
                      <span className="text-brandDark">{formData.ctaText}</span>
                    </div>
                  </div>
                  <div className="p-3 bg-gray-50 rounded-lg text-xs font-medium leading-relaxed text-brandMuted break-all">
                    <span className="block font-bold text-[9px] uppercase mb-1">Shareable File Link URL:</span>
                    {formData.fileLink ? (
                      <a href={formData.fileLink} target="_blank" className="text-brandPurple hover:underline font-bold">
                        {formData.fileLink}
                      </a>
                    ) : (
                      'None provided yet (Required in Step 4)'
                    )}
                  </div>
                </div>
              </div>

            </div>
          )}

          {/* ACTIVE TAB: SAVED ORDER HUB DIRECTORY */}
          {activeTab === 'hub' && (
            <div className="space-y-6">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center">
                <div>
                  <h2 className="text-2xl font-black text-brandDark">Saved Order Blueprints</h2>
                  <p className="text-sm text-brandMuted">Review previously recorded video drafts and collaborate on scripts.</p>
                </div>
                <button 
                  onClick={startNewOrderFromBlank}
                  className="mt-3 md:mt-0 px-6 py-2.5 rounded-xl bg-gradient-to-r from-brandPink to-brandPurple text-white font-bold text-sm shadow-md"
                >
                  Create New Video Order
                </button>
              </div>

              {!window.firebaseEnabled ? (
                <div className="p-8 bg-white border border-gray-200 rounded-2xl text-center max-w-xl mx-auto space-y-4 shadow-sm">
                  <div className="w-12 h-12 rounded-full bg-yellow-100 text-yellow-700 flex items-center justify-center mx-auto">
                    <i className="lucide-alert-triangle w-6 h-6"></i>
                  </div>
                  <h3 className="text-lg font-black text-brandDark">No Active Cloud Sync</h3>
                  <p className="text-xs text-brandMuted leading-relaxed">
                    To save persistent orders, please set your global Firebase Configuration tokens. In this session, orders are loaded from active mock simulation scripts.
                  </p>
                </div>
              ) : ordersLoading ? (
                <div className="text-center py-12">
                  <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-brandPurple mx-auto"></div>
                  <p className="text-xs text-brandMuted mt-4">Retrieving dynamic order database...</p>
                </div>
              ) : ordersList.length === 0 ? (
                <div className="p-12 text-center bg-white rounded-2xl border border-gray-200">
                  <p className="text-sm text-brandMuted font-medium">No order submissions recorded yet. Be the first to build a dynamic ad blueprint!</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  {ordersList.map((order) => (
                    <div key={order.id} className="bg-white border border-gray-100 rounded-xl shadow-sm overflow-hidden flex flex-col justify-between">
                      <div className="p-6 space-y-4">
                        <div className="flex justify-between items-start">
                          <span className={`px-2.5 py-1 rounded-full text-[10px] font-black uppercase ${order.adType === 'service' ? 'bg-pink-100 text-brandPink' : 'bg-purple-100 text-brandPurple'}`}>
                            {order.adType}
                          </span>
                          <span className="text-xs text-brandMuted font-mono">ID: #{order.id.slice(0, 5)}</span>
                        </div>
                        
                        <div>
                          <h4 className="font-extrabold text-brandDark text-sm truncate">{order.email}</h4>
                          <p className="text-[11px] text-brandMuted line-clamp-2 mt-1 italic">
                            Voiceover: "{order.voiceScript}"
                          </p>
                        </div>

                        <div className="text-xs text-brandMuted space-y-1">
                          <div className="flex justify-between">
                            <span>Words Check:</span>
                            <span className="font-bold">{order.wordCount || 0} words</span>
                          </div>
                          <div className="flex justify-between">
                            <span>Call-to-Action:</span>
                            <span className="font-bold text-brandDark">{order.ctaText}</span>
                          </div>
                        </div>
                      </div>

                      <div className="p-4 bg-gray-50 border-t border-gray-100 flex justify-between gap-2">
                        <button 
                          onClick={() => {
                            setLoadedSharedOrder(order);
                            setFormData(order);
                            setActiveTab('creator');
                            setCurrentStepIndex(5); // Go directly to script page to review
                          }}
                          className="flex-1 text-center py-2 bg-white border border-gray-200 text-xs font-bold text-brandDark rounded-lg hover:bg-gray-100 transition"
                        >
                          Edit Script
                        </button>
                        <button 
                          onClick={() => {
                            const link = `${window.location.origin}${window.location.pathname}?orderId=${order.id}`;
                            window.history.pushState({ path: link }, '', link);
                            setOrderIdFromUrl(order.id);
                            fetchSharedOrder(order.id);
                            setActiveTab('shared_viewer');
                          }}
                          className="flex-1 text-center py-2 bg-brandPurple text-white text-xs font-bold rounded-lg hover:bg-opacity-90 transition"
                        >
                          View Mockup
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* ACTIVE TAB: SHARED ORDER VIEWING HUB (FOR CLIENT REVIEWS) */}
          {activeTab === 'shared_viewer' && (
            <div className="space-y-6">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center">
                <div>
                  <h2 className="text-2xl font-black text-brandDark">Shared Video Blueprint Overview</h2>
                  <p className="text-sm text-brandMuted">Review script outlines, download original asset folders, and simulate performance.</p>
                </div>
                <button 
                  onClick={startNewOrderFromBlank}
                  className="mt-3 md:mt-0 px-5 py-2 rounded-lg border border-brandPurple text-brandPurple font-bold text-sm hover:bg-purple-50 transition"
                >
                  Start Fresh Order Form
                </button>
              </div>

              {loadedSharedOrder ? (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                  
                  {/* Left Column: Script outline representation */}
                  <div className="lg:col-span-7 bg-white p-8 rounded-2xl border border-gray-100 shadow-sm space-y-6">
                    <div className="flex justify-between items-center pb-4 border-b border-gray-100">
                      <div>
                        <span className="text-xs text-brandMuted uppercase font-bold">Client Email Target</span>
                        <h3 className="text-lg font-extrabold text-brandDark">{loadedSharedOrder.email}</h3>
                      </div>
                      <span className={`px-3 py-1 rounded-full text-xs font-black uppercase ${loadedSharedOrder.adType === 'service' ? 'bg-pink-100 text-brandPink' : 'bg-purple-100 text-brandPurple'}`}>
                        {loadedSharedOrder.adType} template
                      </span>
                    </div>

                    <div className="space-y-2">
                      <h4 className="font-extrabold text-sm text-brandDark">Selected Voiceover Narrative Script:</h4>
                      <p className="p-4 bg-gray-50 border border-gray-200 rounded-xl leading-relaxed text-sm font-medium italic text-brandGray">
                        "{loadedSharedOrder.voiceScript}"
                      </p>
                      <div className="flex justify-between text-xs text-brandMuted px-1">
                        <span>Total Word Count:</span>
                        <span className="font-bold text-brandPurple">{loadedSharedOrder.wordCount || 0} words (15 seconds)</span>
                      </div>
                    </div>

                    {/* Dynamic Scopes detail list */}
                    <div className="space-y-3 pt-4 border-t border-gray-100">
                      <h4 className="font-extrabold text-sm text-brandDark">Form Parameter Blueprints:</h4>
                      <div className="space-y-2 text-xs">
                        {loadedSharedOrder.adType === 'service' ? (
                          <>
                            <div className="p-3 bg-gray-50 rounded-lg">
                              <span className="block text-brandMuted font-bold uppercase text-[9px] mb-0.5">Scene 1 Stressed Trigger</span>
                              <span className="text-brandDark">{loadedSharedOrder.serviceProblem}</span>
                            </div>
                            <div className="p-3 bg-gray-50 rounded-lg">
                              <span className="block text-brandMuted font-bold uppercase text-[9px] mb-0.5">Scene 2 Action Detail</span>
                              <span className="text-brandDark">{loadedSharedOrder.serviceAction}</span>
                            </div>
                            <div className="p-3 bg-gray-50 rounded-lg">
                              <span className="block text-brandMuted font-bold uppercase text-[9px] mb-0.5">Scene 3 Happy Relief</span>
                              <span className="text-brandDark">{loadedSharedOrder.serviceRelief}</span>
                            </div>
                          </>
                        ) : (
                          <>
                            <div className="p-3 bg-gray-50 rounded-lg">
                              <span className="block text-brandMuted font-bold uppercase text-[9px] mb-0.5">Scene 1 Wow Angle</span>
                              <span className="text-brandDark">{loadedSharedOrder.productWow}</span>
                            </div>
                            <div className="p-3 bg-gray-50 rounded-lg">
                              <span className="block text-brandMuted font-bold uppercase text-[9px] mb-0.5">Scene 2 Usage Demo</span>
                              <span className="text-brandDark">{loadedSharedOrder.productUsage}</span>
                            </div>
                            <div className="p-3 bg-gray-50 rounded-lg">
                              <span className="block text-brandMuted font-bold uppercase text-[9px] mb-0.5">Scene 3 Premium Detail</span>
                              <span className="text-brandDark">{loadedSharedOrder.productDetail}</span>
                            </div>
                          </>
                        )}

                        <div className="p-3 bg-gray-50 rounded-lg flex justify-between items-center">
                          <div>
                            <span className="block text-brandMuted font-bold uppercase text-[9px]">Submitted File Links Folder</span>
                            <a href={loadedSharedOrder.fileLink} target="_blank" className="text-brandPurple hover:underline font-bold text-xs">
                              Click to view Shared Resources Directory
                            </a>
                          </div>
                          <i className="lucide-external-link w-4 h-4 text-brandPurple"></i>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Right Column: Live Mockup player representation */}
                  <div className="lg:col-span-5 bg-white p-6 rounded-2xl border border-gray-100 shadow-sm text-center">
                    <div className="flex justify-between items-center mb-3">
                      <span className="text-xs font-black uppercase text-brandDark tracking-widest">Animated Simulation Preview</span>
                      <button 
                        onClick={() => setIsPlayingSim(!isPlayingSim)}
                        className="text-xs bg-brandPurple/10 text-brandPurple px-3 py-1 rounded-lg font-bold"
                      >
                        {isPlayingSim ? 'Pause Player' : 'Run Simulator'}
                      </button>
                    </div>

                    {/* Viewport copy of Mobile Device Shell */}
                    <div className="relative mx-auto max-w-[250px] aspect-[9/16] rounded-[2.2rem] ring-8 ring-gray-900 bg-black overflow-hidden border-2 border-gray-800">
                      
                      {/* Live Screen */}
                      <div className={`absolute inset-0 bg-gradient-to-b ${getSimBackgroundGradient()} transition-all duration-700 flex flex-col justify-between p-5 text-white`}>
                        <div className="flex justify-between items-center mt-2">
                          <span className="text-[8px] bg-white/20 px-2 py-0.5 rounded-full font-black uppercase">BRAND BOOSTER</span>
                          <span className="text-[9px] font-mono">{Math.floor(simProgress / 6.6).toString().padStart(2, '0')}s</span>
                        </div>

                        <div className="my-auto flex flex-col items-center justify-center text-center space-y-3">
                          <div className="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center animate-bounce">
                            {currentSimScene === 1 ? (
                              <i className="lucide-frown w-6 h-6"></i>
                            ) : currentSimScene === 2 ? (
                              <i className="lucide-activity w-6 h-6"></i>
                            ) : currentSimScene === 3 ? (
                              <i className="lucide-smile w-6 h-6"></i>
                            ) : (
                              <i className="lucide-rocket w-6 h-6"></i>
                            )}
                          </div>
                          
                          <h3 className="text-base font-black uppercase tracking-wider drop-shadow-md">
                            {activeOverlayText()}
                          </h3>

                          <p className="text-[10px] leading-relaxed bg-black/30 p-2 rounded-lg max-w-[190px] mx-auto text-white/95">
                            {activeSceneDescription()}
                          </p>
                        </div>

                        <div className="space-y-2 mb-1">
                          <div className="bg-black/40 p-2 rounded-lg">
                            <p className="text-[10px] italic font-bold leading-relaxed text-gray-200">
                              {activeVoiceSubtitle()}
                            </p>
                          </div>
                          <div className="w-full bg-white/20 h-1 rounded-full overflow-hidden">
                            <div className="bg-brandPink h-full" style={{ width: `${simProgress}%` }}></div>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="mt-4 flex justify-center gap-1.5">
                      {[1, 2, 3, 4].map((n) => (
                        <button 
                          key={n} 
                          onClick={() => { setIsPlayingSim(false); setSimProgress((n - 1) * 25 + 5); }}
                          className={`px-3 py-1.5 rounded text-[10px] font-extrabold ${currentSimScene === n ? 'bg-brandPurple text-white' : 'bg-gray-100 text-brandMuted'}`}
                        >
                          Scene {n}
                        </button>
                      ))}
                    </div>
                  </div>

                </div>
              ) : (
                <div className="text-center py-12 bg-white rounded-2xl border border-gray-100">
                  <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-brandPurple mx-auto"></div>
                  <p className="text-xs text-brandMuted mt-4">Downloading order from cloud pipeline...</p>
                </div>
              )}
            </div>
          )}

          {/* FOOTER COGNITION BAR */}
          <footer className="mt-16 text-center text-xs text-brandMuted border-t border-gray-200 pt-8 space-y-2">
            <p className="font-semibold">&copy; 2026 Brand Booster Media Ltd. All rights reserved.</p>
            <p>Built matching Jotform CSS custom templates featuring high impact variables, Inter text hierarchies, and dynamic 15s mobile rendering grids.</p>
          </footer>

        </div>
      );
    }

    // Mount the Application
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
